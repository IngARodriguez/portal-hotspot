<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Bienvenido - Portal WiFi</title>
  <meta name="description" content="Portal de bienvenida para conexión WiFi.">
  <style>
    /* ============================================
       Estilos base y reset
       ============================================ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-primary: #007AFF;
      --color-primary-light: #4DA3FF;
      --color-primary-dark: #0056CC;
      --color-bg: #FFFFFF;
      --color-text: #1C1C1E;
      --color-text-secondary: #8E8E93;
      --color-progress-bg: #E5E5EA;
      --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font-family);
      background-color: var(--color-bg);
      color: var(--color-text);
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ============================================
       Contenedor principal
       ============================================ */
    .container {
      text-align: center;
      padding: 2rem 1.5rem;
      max-width: 400px;
      width: 100%;
      animation: fadeInUp 0.6s ease-out;
    }

    /* ============================================
       Ícono WiFi
       ============================================ */
    .wifi-icon {
      width: 90px;
      height: 90px;
      margin: 0 auto 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-light));
      border-radius: 24px;
      box-shadow: 0 8px 30px rgba(0, 122, 255, 0.25);
      animation: pulse 2s ease-in-out infinite;
    }

    .wifi-icon svg {
      width: 48px;
      height: 48px;
      fill: #FFFFFF;
    }

    /* ============================================
       Tipografía
       ============================================ */
    .title {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 1.05rem;
      font-weight: 400;
      color: var(--color-text-secondary);
      margin-bottom: 2.5rem;
      line-height: 1.5;
    }

    .redirect-message {
      font-size: 0.875rem;
      color: var(--color-text-secondary);
      margin-bottom: 1rem;
    }

    /* ============================================
       Barra de progreso
       ============================================ */
    .progress-container {
      width: 100%;
      max-width: 260px;
      height: 6px;
      background-color: var(--color-progress-bg);
      border-radius: 3px;
      margin: 0 auto;
      overflow: hidden;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--color-primary), var(--color-primary-light));
      border-radius: 3px;
      animation: fillProgress 3s linear forwards;
    }

    /* ============================================
       Animaciones
       ============================================ */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%, 100% {
        box-shadow: 0 8px 30px rgba(0, 122, 255, 0.25);
      }
      50% {
        box-shadow: 0 8px 40px rgba(0, 122, 255, 0.4);
      }
    }

    @keyframes fillProgress {
      from {
        width: 0%;
      }
      to {
        width: 100%;
      }
    }

    /* ============================================
       Checkmark (se muestra al completar)
       ============================================ */
    .checkmark {
      display: none;
      margin: 1.5rem auto 0;
      width: 40px;
      height: 40px;
      animation: scaleIn 0.3s ease-out;
    }

    .checkmark svg {
      width: 40px;
      height: 40px;
    }

    .checkmark.visible {
      display: block;
    }

    @keyframes scaleIn {
      from {
        transform: scale(0);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* ============================================
       Responsive
       ============================================ */
    @media (max-width: 360px) {
      .title {
        font-size: 1.5rem;
      }

      .subtitle {
        font-size: 0.95rem;
      }

      .wifi-icon {
        width: 76px;
        height: 76px;
        border-radius: 20px;
      }

      .wifi-icon svg {
        width: 40px;
        height: 40px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Ícono de WiFi -->
    <div class="wifi-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M12 18c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1zm0-4c-1.62 0-3.07.65-4.13 1.7l1.42 1.42A3.93 3.93 0 0 1 12 16c1.11 0 2.11.45 2.83 1.17l1.42-1.42A5.92 5.92 0 0 0 12 14zm0-4c-2.73 0-5.19 1.11-6.97 2.9l1.42 1.42A7.94 7.94 0 0 1 12 12c2.21 0 4.21.9 5.66 2.34l1.42-1.42A9.94 9.94 0 0 0 12 10zm0-4c-3.83 0-7.31 1.56-9.83 4.07l1.42 1.42A11.94 11.94 0 0 1 12 8c3.33 0 6.35 1.35 8.53 3.53l1.42-1.42A13.93 13.93 0 0 0 12 6z"/>
      </svg>
    </div>

    <!-- Textos -->
    <h1 class="title">Bienvenido</h1>
    <p class="subtitle">Conectado correctamente a la red</p>

    <!-- Mensaje de redirección -->
    <p class="redirect-message">Serás redirigido en <span id="countdown">3</span> segundos...</p>

    <!-- Barra de progreso -->
    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- Checkmark al completar -->
    <div class="checkmark" id="checkmark">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#34C759" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
  </div>

  <script>
    // ============================================
    // Lógica de cuenta regresiva y redirección
    // ============================================

    (function () {
      'use strict';

      var REDIRECT_URL = 'https://google.com';
      var TOTAL_SECONDS = 3;
      var secondsLeft = TOTAL_SECONDS;
      var countdownEl = document.getElementById('countdown');
      var checkmarkEl = document.getElementById('checkmark');

      // Actualizar la cuenta regresiva cada segundo
      var timer = setInterval(function () {
        secondsLeft--;

        // Actualizar el texto del contador
        if (countdownEl) {
          countdownEl.textContent = secondsLeft;
        }

        // Cuando llega a 0, redirigir
        if (secondsLeft <= 0) {
          clearInterval(timer);

          // Mostrar el checkmark antes de redirigir
          if (checkmarkEl) {
            checkmarkEl.classList.add('visible');
          }

          // Pequeño retraso para que se vea el checkmark
          setTimeout(function () {
            try {
              window.location.href = REDIRECT_URL;
            } catch (error) {
              // Fallback en caso de error
              console.error('Error al redirigir:', error);
              window.location.replace(REDIRECT_URL);
            }
          }, 300);
        }
      }, 1000);
    })();
  </script>
</body>
</html>
