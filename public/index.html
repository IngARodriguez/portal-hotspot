<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Subir archivos</title>
  <meta name="description" content="Portal de subida de archivos a la nube.">
  <style>
    /* ============================================
       Reset y variables
       ============================================ */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #007AFF;
      --primary-hover: #0062D6;
      --primary-light: rgba(0, 122, 255, 0.08);
      --primary-glow: rgba(0, 122, 255, 0.2);
      --bg: #F2F2F7;
      --card: #FFFFFF;
      --text: #1C1C1E;
      --text-secondary: #8E8E93;
      --border: #E5E5EA;
      --success: #34C759;
      --error: #FF3B30;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    html,
    body {
      height: 100%;
      width: 100%;
    }

    body {
      font-family: var(--font);
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
      -webkit-font-smoothing: antialiased;
    }

    /* ============================================
       Contenedor principal
       ============================================ */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.75rem 1.5rem;
      width: 100%;
      max-width: 440px;
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ============================================
       Título
       ============================================ */
    .title {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 1.25rem;
      letter-spacing: -0.01em;
    }

    /* ============================================
       Zona de Drag & Drop
       ============================================ */
    .dropzone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background-color 0.2s;
      position: relative;
    }

    .dropzone:hover,
    .dropzone.dragover {
      border-color: var(--primary);
      background-color: var(--primary-light);
    }

    .dropzone-icon {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      display: block;
    }

    .dropzone-text {
      font-size: 0.95rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .dropzone-text span {
      color: var(--primary);
      font-weight: 600;
      text-decoration: underline;
    }

    .dropzone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    /* ============================================
       Lista de archivos seleccionados
       ============================================ */
    .file-list {
      list-style: none;
      margin-top: 1rem;
      display: none;
    }

    .file-list.visible {
      display: block;
    }

    .file-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 0.75rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.875rem;
    }

    .file-list li:last-child {
      border-bottom: none;
    }

    .file-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-right: 0.75rem;
      font-weight: 500;
    }

    .file-size {
      color: var(--text-secondary);
      font-size: 0.8rem;
      flex-shrink: 0;
    }

    /* ============================================
       Botón de subida
       ============================================ */
    .upload-btn {
      display: none;
      width: 100%;
      padding: 0.85rem;
      margin-top: 1.25rem;
      background-color: var(--primary);
      color: #FFFFFF;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .upload-btn.visible {
      display: block;
    }

    .upload-btn:hover {
      background-color: var(--primary-hover);
    }

    .upload-btn:active {
      transform: scale(0.98);
    }

    .upload-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* ============================================
       Barra de progreso
       ============================================ */
    .progress-container {
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      margin-top: 1rem;
      overflow: hidden;
      display: none;
    }

    .progress-container.visible {
      display: block;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #4DA3FF);
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .progress-bar.indeterminate {
      width: 40%;
      animation: indeterminate 1.2s ease-in-out infinite;
    }

    @keyframes indeterminate {
      0% {
        transform: translateX(-100%);
      }

      100% {
        transform: translateX(350%);
      }
    }

    /* ============================================
       Mensaje de estado
       ============================================ */
    .status {
      text-align: center;
      font-size: 0.9rem;
      margin-top: 1rem;
      font-weight: 500;
      display: none;
      line-height: 1.5;
    }

    .status.visible {
      display: block;
    }

    .status.uploading {
      color: var(--text-secondary);
    }

    .status.success {
      color: var(--success);
    }

    .status.error {
      color: var(--error);
    }

    /* ============================================
       Sección de almacenamiento
       ============================================ */
    .storage-section {
      background: var(--bg);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      margin-bottom: 1.25rem;
    }

    .storage-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .storage-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
    }

    .storage-detail {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .storage-bar-bg {
      width: 100%;
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .storage-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #4DA3FF);
      border-radius: 4px;
      transition: width 0.5s ease;
      min-width: 0;
    }

    .storage-bar-fill.warning {
      background: linear-gradient(90deg, #FF9500, #FF3B30);
    }

    .storage-files {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 0.4rem;
    }

    .storage-loading {
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-align: center;
      padding: 0.25rem 0;
    }

    /* ============================================
       Responsive
       ============================================ */
    @media (max-width: 360px) {
      .card {
        padding: 1.25rem 1rem;
      }

      .title {
        font-size: 1.3rem;
      }

      .dropzone {
        padding: 2rem 0.75rem;
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <h1 class="title">📤 Subir archivos</h1>

    <!-- Estado del almacenamiento -->
    <div class="storage-section" id="storageSection">
      <p class="storage-loading" id="storageLoading">Cargando almacenamiento...</p>
      <div id="storageContent" style="display:none;">
        <div class="storage-header">
          <span class="storage-label">💾 Almacenamiento</span>
          <span class="storage-detail" id="storageText">-- / --</span>
        </div>
        <div class="storage-bar-bg">
          <div class="storage-bar-fill" id="storageBarFill" style="width:0%"></div>
        </div>
        <p class="storage-files" id="storageFiles">0 archivos</p>
      </div>
    </div>

    <!-- Zona de Drag & Drop -->
    <div class="dropzone" id="dropzone">
      <span class="dropzone-icon">📁</span>
      <p class="dropzone-text">
        Arrastra archivos aquí o <span>selecciona manualmente</span>
      </p>
      <input type="file" id="fileInput" accept="*/*" multiple>
    </div>

    <!-- Lista de archivos seleccionados -->
    <ul class="file-list" id="fileList"></ul>

    <!-- Botón de subida -->
    <button class="upload-btn" id="uploadBtn">Subir archivos</button>

    <!-- Barra de progreso -->
    <div class="progress-container" id="progressContainer">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- Mensaje de estado -->
    <p class="status" id="statusMsg"></p>
  </div>

  <script>
    // ============================================
    // Referencias a elementos del DOM
    // ============================================
    var dropzone = document.getElementById('dropzone');
    var fileInput = document.getElementById('fileInput');
    var fileList = document.getElementById('fileList');
    var uploadBtn = document.getElementById('uploadBtn');
    var progressContainer = document.getElementById('progressContainer');
    var progressBar = document.getElementById('progressBar');
    var statusMsg = document.getElementById('statusMsg');

    // Archivos seleccionados actualmente
    var archivosSeleccionados = [];

    // ============================================
    // Obtener el token desde la URL
    // ============================================
    function obtenerToken() {
      var params = new URLSearchParams(window.location.search);
      return params.get('token') || '';
    }

    // ============================================
    // Cargar estado del almacenamiento
    // ============================================
    var storageLoading = document.getElementById('storageLoading');
    var storageContent = document.getElementById('storageContent');
    var storageText = document.getElementById('storageText');
    var storageBarFill = document.getElementById('storageBarFill');
    var storageFiles = document.getElementById('storageFiles');

    async function cargarAlmacenamiento() {
      try {
        var token = obtenerToken();
        var response = await fetch('/storage-status?token=' + encodeURIComponent(token));
        var data = await response.json();

        if (!data.ok) throw new Error(data.error);

        var porcentaje = (data.usado / data.limite) * 100;
        var usadoTexto = formatearTamano(data.usado);
        var limiteTexto = formatearTamano(data.limite);

        storageText.textContent = usadoTexto + ' / ' + limiteTexto;
        storageBarFill.style.width = Math.min(porcentaje, 100).toFixed(1) + '%';
        storageFiles.textContent = data.totalArchivos + ' archivo' + (data.totalArchivos !== 1 ? 's' : '');

        // Color de advertencia si supera el 80%
        if (porcentaje > 80) {
          storageBarFill.classList.add('warning');
        } else {
          storageBarFill.classList.remove('warning');
        }

        storageLoading.style.display = 'none';
        storageContent.style.display = 'block';
      } catch (error) {
        storageLoading.textContent = '⚠️ No se pudo cargar el almacenamiento';
      }
    }

    // Cargar al iniciar la página
    cargarAlmacenamiento();

    // ============================================
    // Formatear tamaño de archivo (bytes → KB/MB)
    // ============================================
    function formatearTamano(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    // ============================================
    // Mostrar la lista de archivos seleccionados
    // ============================================
    function mostrarArchivos() {
      fileList.innerHTML = '';

      if (archivosSeleccionados.length === 0) {
        fileList.classList.remove('visible');
        uploadBtn.classList.remove('visible');
        return;
      }

      archivosSeleccionados.forEach(function (archivo) {
        var li = document.createElement('li');
        li.innerHTML =
          '<span class="file-name">' + archivo.name + '</span>' +
          '<span class="file-size">' + formatearTamano(archivo.size) + '</span>';
        fileList.appendChild(li);
      });

      fileList.classList.add('visible');
      uploadBtn.classList.add('visible');
    }

    // ============================================
    // Manejar selección de archivos (input o drop)
    // ============================================
    function manejarArchivos(files) {
      archivosSeleccionados = Array.from(files);
      mostrarArchivos();
      // Limpiar mensajes previos
      ocultarEstado();
    }

    // Evento: selección con el input
    fileInput.addEventListener('change', function () {
      manejarArchivos(fileInput.files);
    });

    // ============================================
    // Eventos de Drag & Drop
    // ============================================
    dropzone.addEventListener('dragover', function (e) {
      e.preventDefault();
      dropzone.classList.add('dragover');
    });

    dropzone.addEventListener('dragleave', function () {
      dropzone.classList.remove('dragover');
    });

    dropzone.addEventListener('drop', function (e) {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      manejarArchivos(e.dataTransfer.files);
    });

    // ============================================
    // Mostrar mensaje de estado
    // ============================================
    function mostrarEstado(mensaje, tipo) {
      statusMsg.textContent = mensaje;
      statusMsg.className = 'status visible ' + tipo;
    }

    function ocultarEstado() {
      statusMsg.className = 'status';
    }

    // ============================================
    // Subir archivos al servidor
    // ============================================
    uploadBtn.addEventListener('click', async function () {
      if (archivosSeleccionados.length === 0) return;

      var token = obtenerToken();

      // Deshabilitar controles durante la subida
      uploadBtn.disabled = true;
      fileInput.disabled = true;

      // Mostrar progreso indeterminado y estado
      progressContainer.classList.add('visible');
      progressBar.classList.add('indeterminate');
      mostrarEstado('⏳ Subiendo archivos...', 'uploading');

      try {
        // Construir FormData con los archivos seleccionados
        var formData = new FormData();
        archivosSeleccionados.forEach(function (archivo) {
          formData.append('archivos', archivo);
        });

        // Enviar los archivos al servidor
        var response = await fetch('/upload?token=' + encodeURIComponent(token), {
          method: 'POST',
          body: formData
        });

        var data = await response.json();

        // Detener animación de progreso
        progressBar.classList.remove('indeterminate');

        if (data.ok) {
          // Éxito: llenar barra al 100% y mostrar mensaje
          progressBar.style.width = '100%';
          mostrarEstado('✅ Archivos subidos correctamente', 'success');

          // Actualizar el almacenamiento después de subir
          cargarAlmacenamiento();

          // Limpiar después de 3 segundos
          setTimeout(function () {
            archivosSeleccionados = [];
            fileInput.value = '';
            mostrarArchivos();
            progressContainer.classList.remove('visible');
            progressBar.style.width = '0%';
            ocultarEstado();
          }, 3000);
        } else {
          // Error del servidor
          progressContainer.classList.remove('visible');
          mostrarEstado('❌ Error: ' + data.error, 'error');
        }

      } catch (error) {
        // Error de red o inesperado
        progressBar.classList.remove('indeterminate');
        progressContainer.classList.remove('visible');
        mostrarEstado('❌ Error: ' + error.message, 'error');
      }

      // Rehabilitar controles
      uploadBtn.disabled = false;
      fileInput.disabled = false;
    });
  </script>
</body>

</html>
